name: Validate

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - "codex/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: workers/github-app-discord-bot/package-lock.json

      - name: Install Worker dependencies
        run: npm --prefix workers/github-app-discord-bot ci

      - name: Run Worker tests
        run: npm test
