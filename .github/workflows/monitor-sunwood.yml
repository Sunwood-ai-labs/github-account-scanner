name: Monitor Sunwood Account

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Scan Sunwood-ai-labs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          uv run github-scan check Sunwood-ai-labs \
            --state-file state/sunwood-ai-labs.json \
            --json-report state/last-report.json \
            --markdown-report state/last-report.md

      - name: Read change flags
        id: flags
        run: |
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("state/last-report.json").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"changed={'true' if report['changed'] else 'false'}\n")
              output.write(f"bootstrap={'true' if report['bootstrap'] else 'false'}\n")
          PY

      - name: Create issue for detected changes
        if: steps.flags.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          issue_title="[github-scan] Sunwood-ai-labs updates detected on $(date -u +%F)"
          gh issue create --title "$issue_title" --body-file state/last-report.md

      - name: Notify Discord
        if: steps.flags.outputs.changed == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_BOT_TOKEN}" ] && [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "Discord bot token / webhook is empty; skipping Discord notification."
            exit 0
          fi
          uv run github-scan notify-discord --report-file state/last-report.json

      - name: Commit updated state
        if: steps.flags.outputs.bootstrap == 'true' || steps.flags.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/sunwood-ai-labs.json state/last-report.json state/last-report.md
          git commit -m "chore: update github-scan state for Sunwood-ai-labs" || exit 0
          git push origin HEAD:${GITHUB_REF_NAME}
